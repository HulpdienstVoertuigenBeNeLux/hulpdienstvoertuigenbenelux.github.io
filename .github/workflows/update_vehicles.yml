name: Verwerk Voertuig Data
on:
  push:
    paths:
      - 'raw_data.json' # Workflow start alleen als dit bestand wijzigt

jobs:
  process-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run processor
        run: python process_vehicles.py
      - name: Commit en push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add vehicle_counts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update voertuig statistieken" && git push)
