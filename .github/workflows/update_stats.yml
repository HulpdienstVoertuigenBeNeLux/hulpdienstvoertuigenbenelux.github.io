name: Verwerk Voertuig Data
on:
  push:
    paths:
      - 'raw_data.json'
  workflow_dispatch:

jobs:
  process-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run processor
        run: python process_vehicles.py
      - name: Commit en push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # Controleer of er wijzigingen zijn
          if [ -n "$(git status --porcelain vehicle_counts.json)" ]; then
            git add vehicle_counts.json
            git commit -m "Update voertuig statistieken: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "Geen wijzigingen in vehicle_counts.json."
          fi
