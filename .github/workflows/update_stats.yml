name: Verwerk Voertuig Data
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Elk uur

jobs:
  process-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python process_vehicles.py
      - name: Commit en push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add vehicle_counts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update voertuig statistieken: $(date +'%Y-%m-%d %H:%M')" && git push)
