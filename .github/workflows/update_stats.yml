name: Verwerk Voertuig Data
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Elk uur

jobs:
  process-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python process_vehicles.py
      - name: Commit & Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          # Check of er wijzigingen zijn
          if git diff --exit-code; then
            echo "Geen wijzigingen, stoppen..."
            exit 0
          fi
          git add vehicle_counts.json
          git commit -m "Auto-update vehicle_counts.json"
          git push
