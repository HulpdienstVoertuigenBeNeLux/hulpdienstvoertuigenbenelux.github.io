name: Verwerk Voertuig Data
on:
  push:
    paths:
      - 'raw_data.json'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        run: pip install requests
      - name: Run script
        run: python process_vehicles.py # Dit script haalt nu zelf op en slaat op
      - name: Commit en push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # Voeg zowel de raw data als de nieuwe statistieken toe
          git add raw/ vehicle_counts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update voertuig data en statistieken" && git push)
