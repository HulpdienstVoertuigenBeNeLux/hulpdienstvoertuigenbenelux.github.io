<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandweer Voertuigen Overzicht</title>
    <style>
        :root { --primary: #e63946; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 40px; }
        
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        #last-update { font-size: 0.85em; color: #666; margin-bottom: 20px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #fff5f5; }
        
        .loading { font-style: italic; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2>Brandweer Voertuig Statistieken</h2>
    <div id="last-update">Laatste update: <span class="loading">data ophalen...</span></div>
    
    <table>
        <thead>
            <tr>
                <th>Type Voertuig</th>
                <th>Aantal</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    async function loadData() {
        try {
            // 1. Haal de JSON data op
            const response = await fetch('vehicle_counts.json');
            const data = await response.json();
            const tbody = document.getElementById('table-body');
            
            // Sorteer op aantal (hoogste eerst)
            const sortedData = Object.entries(data).sort((a, b) => b[1] - a[1]);

            sortedData.forEach(([type, count]) => {
                tbody.innerHTML += `<tr><td>${type}</td><td>${count}</td></tr>`;
            });

            // 2. Haal timestamp op uit GitHub commit geschiedenis
            const commitRes = await fetch('https://api.github.com/repos/HulpdienstVoertuigenBeNeLux/hulpdienstvoertuigenbenelux.github.io/commits?path=vehicle_counts.json');
            const commits = await commitRes.json();
            const date = new Date(commits[0].commit.committer.date);
            
            document.getElementById('last-update').innerHTML = 
                `Laatste update: ${date.toLocaleString('nl-NL', { dateStyle: 'full', timeStyle: 'short' })}`;
        
        } catch (error) {
            document.getElementById('last-update').innerText = "Kon data niet laden.";
            console.error(error);
        }
    }
    loadData();
</script>

</body>
</html>
